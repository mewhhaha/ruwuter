name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno task fmt:check

      - name: Lint
        run: deno lint

      - name: Typecheck
        run: deno task typecheck

      - name: Run unit tests
        run: deno task test

      - name: Run DOM integration tests
        run: deno task test:dom

      - name: Enforce browser size budgets
        run: deno task size
